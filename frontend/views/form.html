<div class="row">
    <div class="col-md-12">
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="card-title mb-0">{{ isEdit ? 'Edit Data Barang' : 'Tambah Data Barang' }}</h2>
                    <div>
                        <button class="btn btn-secondary me-2" ng-click="kembali()" ng-disabled="loading">Kembali</button>
                    </div>
                </div>

                <div ng-if="errorMessage" class="alert alert-danger">
                    {{ errorMessage }}
                </div>

                <div ng-if="successMessage" class="alert alert-success">
                    {{ successMessage }}
                </div>

                <form ng-submit="submitForm()" name="barangForm" novalidate>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Kode Barang</label>
                            <input type="text" class="form-control" ng-model="formData.kode_barang" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nama Barang</label>
                            <input type="text" class="form-control" ng-model="formData.nama_barang" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Kategori</label>
                            <input type="text" class="form-control" ng-model="formData.kategori">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Satuan</label>
                            <select class="form-select" ng-model="formData.satuan" required>
                                <option value="pcs">Pcs</option>
                                <option value="kg">Kg</option>
                                <option value="gram">Gram</option>
                                <option value="liter">Liter</option>
                                <option value="box">Box</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Harga Beli</label>
                            <div class="input-group">
                                <span class="input-group-text">Rp</span>
                                <input type="number" class="form-control" ng-model="formData.harga_beli" min="0" required>
                            </div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Harga Jual</label>
                            <div class="input-group">
                                <span class="input-group-text">Rp</span>
                                <input type="number" class="form-control" ng-model="formData.harga_jual" min="0" required>
                            </div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Stok Awal</label>
                            <input type="number" class="form-control" ng-model="formData.stok" min="0" ng-disabled="isEdit" required>
                            <small class="text-muted" ng-if="isEdit">Stok hanya bisa diubah melalui transaksi barang.</small>
                        </div>
                    </div>

                    <div class="text-end mt-4">
                        <button type="submit" class="btn btn-primary" ng-disabled="barangForm.$invalid || loading">
                            <span ng-if="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                            Simpan Data
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
