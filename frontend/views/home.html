<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-4">Login</h2>

                <div ng-if="loginError" class="alert alert-danger alert-dismissible fade show" role="alert">
                    {{ loginError }}
                    <button type="button" class="btn-close" ng-click="loginError = null"></button>
                </div>

                <form ng-submit="login()">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="admin@example.com"
                            ng-model="email" required ng-disabled="loading">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" placeholder="admin"
                            ng-model="password" required ng-disabled="loading">
                    </div>
                    <button type="submit" class="btn btn-primary w-100" ng-disabled="loading">
                        <span ng-if="!loading">Login</span>
                        <span ng-if="loading">
                            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                            Logging in...
                        </span>
                    </button>
                </form>

                <hr>
                <p class="text-muted small">Demo credentials:</p>
                <p class="text-muted small">Email: admin@example.com<br>Password: admin</p>
            </div>
        </div>
    </div>
</div>
