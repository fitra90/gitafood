<div class="row">
    <div class="col-md-12">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-4">Dashboard</h2>
                <div ng-if="user">
                    <p><strong>Welcome,</strong> {{ user.name }}</p>
                    <p><strong>Email:</strong> {{ user.email }}</p>
                    <button class="btn btn-danger" ng-click="logout()">Logout</button>
                </div>
                <div ng-if="!user">
                    <p>Loading user information...</p>
                    <button class="btn btn-secondary" ng-click="getUser()">Refresh</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Load user data when dashboard view is shown
    var mainCtrl = angular.element('[ng-controller="MainController"]').scope();
    mainCtrl.getUser();
</script>
